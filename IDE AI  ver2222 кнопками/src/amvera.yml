    meta:
  environment: node
  toolchain:
    name: browser
    version: 18 +
            - имя: Загрузить артефакт сборки
  используется: actions/upload-artifact@v3.2.2
  с:
    # Название артефакта
    имя: # необязательно, по умолчанию — артефакт
    # Файл, каталог или шаблон с подстановочным знаком, описывающий, что нужно загрузить.
    путь:
    # Желаемое поведение, если файлы не найдены по указанному пути.
Доступные варианты:
  Предупреждение: Вывести предупреждение, но не прерывать выполнение действия.
  Ошибка: Действие завершилось с ошибкой.
  игнорировать: не выводить никаких предупреждений или ошибок, действие не завершается с ошибкой.

    if-no-files-found: # необязательный параметр, по умолчанию выдается предупреждение
    # Продолжительность, по истечении которой артефакт будет удален из памяти (в днях). 0 означает использование срока хранения по умолчанию.
Минимальный срок — 1 день. Максимальный — 90 дней, если иное не указано на странице настроек репозитория.

    retention-days: # необязательно
    # Если true, скрытые файлы будут включены в загружаемый артефакт. Если false, скрытые файлы будут исключены из загружаемого артефакта.

    include-hidden-files: # необязательный параметр, по умолчанию false
